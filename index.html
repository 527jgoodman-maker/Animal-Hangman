<!doctype html>
<html lang="en">
  <head>
    <title>Hangman game</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- Difficulty popup shown at start and on restart -->
    <div class="popup" id="popup">
      <div class="popup-content">
        <h2>Choose a Difficulty</h2>
        <p>Select the difficulty level for your Hangman game.</p>
        <button onclick="selectDifficulty('easy')" class="btn btn-success">Easy Animals</button>
        <button onclick="selectDifficulty('medium')" class="btn btn-warning">Medium Animals</button>
        <button onclick="selectDifficulty('hard')" class="btn btn-danger">Hard Animals</button>
      </div>
    </div>

    <main>
      <div class="container mt-5">
        <h1 class="text-center mb-4">Animal Hangman</h1>
        <div class="row justify-content-center">
          <div class="col-md-8">

            <!-- Health bar -->
            <div id="healthContainer">
              <div id="healthBar"></div>
            </div>

            <!-- Word display -->
            <h1 id="wordDisplay" class="wordDisplay">_ _ _ _ _ _ _ _</h1>

            <!-- Guesses left -->
            <h4 id="guessesLeft" class="mb-3">Guesses Left: 6</h4>

            <!-- Guessed letters display -->
            <div id="guessedLetters" class="mb-3"></div>

            <!-- Win/lose/duplicate message -->
            <div id="message" class="mb-3"></div>

            <!-- Input and buttons -->
            <div class="mb-3">
              <input
                type="text"
                id="guess-input"
                class="form-control d-inline-block w-auto"
                maxlength="1"
                placeholder="Enter a letter"
              />
              <button id="guess-button" class="btn btn-primary ms-2">Guess</button>
              <button id="restart-button" class="btn btn-secondary ms-2">Restart</button>
            </div>

          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
  </body>
</html>
