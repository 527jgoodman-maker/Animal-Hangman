<!doctype html>
<html lang="en">
  <head>
    <title>Hangman game</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <!-- place navbar here -->
    </header>
    <div class="popup" id="popup">
      <div class="popup-content">
        <h2>Choose a Difficulty</h2>
        <p>Select the difficulty level for your Hangman game.</p>
        <button onclick="startGame('easy'); document.getElementById('popup').style.display='none';" class="btn btn-success">Easy Animals</button>
       <button onclick="startGame('medium'); document.getElementById('popup').style.display='none';" class="btn btn-warning">Medium Animals</button>
        <button onclick="startGame('hard'); document.getElementById('popup').style.display='none';" class="btn btn-danger">Hard Animals</button>

      </div>
    </div>
    <main>
      <div class="container mt-5">
        <h1 class="text-center mb-4">Animal Hangman</h1>
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div id="hangman-container" class="text-center">
              <div id="hangman-drawing" class="mb-4">
                <!-- Hangman drawing will be updated here -->
              </div>
              <div id="word-display" class="mb-3">
                <!-- Word display -->
              </div>
              <div id="guessed-letters" class="mb-3">
                <!-- Guessed letters -->
              </div>
              <div class="mb-3">
                <input
                  type="text"
                  id="guess-input"
                  class="form-control d-inline-block w-auto"
                  maxlength="1"
                  placeholder="Enter a letter"
                />
                <button id="guess-button" class="btn btn-primary ms-2">
                  Guess
                </button>
              </div>
              <div id="message" class="alert alert-info">
                <!-- Messages -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
